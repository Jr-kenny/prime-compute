# Render blueprint for the metering worker.
# The free plan spins down after ~15 min idle: point a free pinger
# (cron-job.org / UptimeRobot) at /health every ~10 min to keep it warm.
# Metering is restart-safe, so a spin-down pauses billing, never corrupts it.
services:
  - type: web
    name: primecompute-worker
    runtime: docker
    plan: free
    dockerfilePath: ./services/Dockerfile
    dockerContext: ./services
    healthCheckPath: /health
    envVars:
      # Tuning (safe defaults, override in the dashboard if needed)
      - key: WORKER_TICK_MS
        value: "1000"
      - key: WORKER_DEFAULT_MAX_UNITS
        value: "600"
      - key: WORKER_LEASE_CAP_ATOMIC
        value: "1000000"
      # Secrets: sync:false means Render prompts for the value on first deploy.
      # Use the same values as the web app's env (root .env).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SPEND_WALLET_ENC_KEY
        sync: false
      - key: ARC_RPC_URL
        sync: false
      - key: ARC_CHAIN_ID
        sync: false
      - key: USDC_ADDRESS
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: CIRCLE_API_KEY
        sync: false
      - key: CIRCLE_ENTITY_SECRET
        sync: false
      - key: CIRCLE_WALLET_SET_ID
        sync: false
      - key: PLATFORM_TREASURY_ADDRESS
        sync: false
      - key: WALLET_BACKEND
        sync: false

  # The always-on x402 seller a lease actually pays. Without a reachable provider the
  # worker meters against localhost and charges nothing; this gives it a real endpoint
  # that stays up when your laptop is off. Same Bun image as the worker, different command.
  - type: web
    name: prime-provider
    runtime: docker
    plan: free
    dockerfilePath: ./services/Dockerfile.provider
    dockerContext: ./services
    healthCheckPath: /health
    envVars:
      # PROVIDER_PRICE matches the registered provider's price_per_charge so the amount
      # the seller demands lines up with what the worker funded into Gateway.
      - key: PROVIDER_PRICE
        value: "$0.000006"
      - key: PROVIDER_RESOURCE_TYPE
        value: GPU
      - key: PROVIDER_ALIAS
        value: mine-1
      - key: PROVIDER_REGION
        value: US-East
      # The only thing you fill in: the seller wallet (same as services/.env). It only
      # receives USDC, it pays no gas to receive.
      - key: PROVIDER_WALLET_PRIVATE_KEY
        sync: false
